<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Website - Home</title>
  <style>
    body {
      font-family: Georgia, 'Times New Roman', Times, serif, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #050000, #ad0101);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: rgb(164, 85, 85);
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      padding: 2rem;
      width: 350px;
      text-align: center;
    }

    h1 {
      margin-bottom: 1rem;
      color: #000000;
    }

    .input-group {
      margin: 1rem 0;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 0.3rem;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 0.7rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
    }

    input:focus {
      border-color: #000000;
    }

    .btn {
      background: #f90303;
      color: white;
      border: none;
      padding: 0.8rem;
      width: 100%;
      margin-top: 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }

    .btn:hover {
      background: #f80101;
    }

    .extra-links {
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .extra-links a {
      color: #3d0707;
      text-decoration: none;
      margin: 0 5px;
    }

    .extra-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Welcome</h1>
    <form id="loginForm">
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" required />
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" required />
      </div>
      <button type="submit" class="btn">Login</button>
    </form>

    <div class="extra-links">
      <a href="#">Register</a> | 
      <a href="#">Forgot Password?</a>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById("loginForm");

    loginForm.addEventListener("submit", function(e) {
      e.preventDefault();
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      // 🔹 Later you can connect this to your backend authentication
      if(username === "sthirr" && password === "3104") {
        alert("Login Successful! Redirecting...");
        window.location.href = "home.html"; // Replace with your main page
      } else {
        alert("Invalid credentials. Try again.");
      }
    });
  </script>
</body>
</html>
