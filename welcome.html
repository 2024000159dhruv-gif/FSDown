<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome Page</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'geogia', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif, sans-serif;
      background: linear-gradient(to right, #000000, #ff0000);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 111vh;
      text-align: center;
    }
    .stranger-things {
      font-family: 'ITC Benguiat', serif;
      color: red;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-shadow: 0 0 5px #ff0000, 0 0 15px #ff0000;
    }


    .welcome-container {
      background: rgba(0, 0, 0, 0.5);
      padding: 50px;
      border-radius: 55px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 6em;
      margin-bottom: 70px;
    }

    p {
      font-size: 1.5em;
      margin-bottom: 40px;
    }

    .btn {
      background: #ff0000;
      color: #fdfdfd;
      padding: 18px 38px;
      border: none;
      border-radius: 19px;
      cursor: pointer;
      font-size: 1.2em;
      transition: all 0.5s ease;
    }

    .btn:hover {
      background: #ed5a5a;
      color: #3c0c0c;
    }
  </style>
</head>
<body>
  <div class="welcome-container">
    <h1>Welcome!</h1>
    <p>We’re glad to have you here. You’ll find all the things you need shortly.</p>
    <a href="login page.html" class="btn">Get Started</a>

  </div>
</body>
</html>
